<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情緒記錄表</title>
  <style>
    /* ── Print setup ── */
    @page {
      size: A4 portrait;
      margin: 10mm 12mm;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #fff;
      color: #3a3a3a;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 0;
      font-size: 11px;
    }

    /* ── Header ── */
    .header-img {
      width: 100%;
      display: block;
      border-radius: 10px;
      margin-bottom: 5px;
    }

    /* ── Legend section ── */
    .legend-section {
      margin-bottom: 5px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .legend-label {
      font-size: 10px;
      font-weight: 700;
      color: #4a3f5c;
      white-space: nowrap;
      width: 52px;
      flex-shrink: 0;
      text-align: right;
    }

    .legend-img {
      height: 164px;
      display: block;
      flex: 1;
      object-fit: contain;
      object-position: left center;
    }

    /* ── Grid ── */
    .grid-section {
      margin-bottom: 5px;
    }

    .grid-title {
      font-size: 11px;
      font-weight: 700;
      color: #4a3f5c;
      margin-bottom: 3px;
      padding-left: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead tr {
      background: #e8e2f5;
    }

    th {
      padding: 4px 3px;
      font-size: 10px;
      font-weight: 700;
      color: #4a3f5c;
      border: 1px solid #c9bbea;
      text-align: center;
      vertical-align: middle;
      line-height: 1.3;
    }

    td {
      padding: 3px 2px;
      border: 1px solid #d9d0ee;
      text-align: center;
      vertical-align: middle;
      height: 20px;
      font-size: 10px;
      color: #4a3f5c;
    }

    /* Column widths */
    .col-date    { width: 10%; }
    .col-mood    { width: 13%; }
    .col-anxiety { width: 13%; }
    .col-sleep   { width: 13%; }
    .col-sleeph  { width: 10%; }
    .col-notes   { width: 41%; }

    tbody tr:nth-child(even) { background: #faf8ff; }
    tbody tr:nth-child(odd)  { background: #ffffff; }

    tbody tr:hover { background: #f0ecfa; }

    /* Weekday tint */
    .sat { color: #6a8acc; }
    .sun { color: #cc6a6a; }

    /* Rating circles */
    .rating-cell {
      display: flex;
      justify-content: center;
      gap: 2px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid #ccc;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Colour dots for mood */
    .dot-mood-1 { border-color: #e57373; }
    .dot-mood-2 { border-color: #ffb74d; }
    .dot-mood-3 { border-color: #fff176; }
    .dot-mood-4 { border-color: #aed581; }
    .dot-mood-5 { border-color: #66bb6a; }

    /* Colour dots for anxiety (reversed) */
    .dot-anx-1  { border-color: #e57373; }
    .dot-anx-2  { border-color: #ffb74d; }
    .dot-anx-3  { border-color: #fff176; }
    .dot-anx-4  { border-color: #aed581; }
    .dot-anx-5  { border-color: #66bb6a; }

    /* Colour dots for sleep */
    .dot-slp-1  { border-color: #e57373; }
    .dot-slp-2  { border-color: #ffb74d; }
    .dot-slp-3  { border-color: #fff176; }
    .dot-slp-4  { border-color: #aed581; }
    .dot-slp-5  { border-color: #66bb6a; }

    /* ── Footer ── */
    .footer-img {
      width: 100%;
      display: block;
      border-radius: 10px;
      margin-top: 4px;
    }

    /* ── Print tweaks ── */
    @media print {
      body { margin: 0; padding: 0; }
      .no-print { display: none; }
    }

    /* ── Screen only: print button ── */
    .print-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c9bbea;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(100,80,140,0.25);
      z-index: 99;
    }
    .print-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- Header -->
  <img class="header-img" src="chart_header.png" alt="情緒記錄表頁首" />

  <!-- Rating legends -->
  <div class="legend-section">
    <div class="legend-row">
      <span class="legend-label">情緒評分</span>
      <img class="legend-img" src="chart_mood.png" alt="情緒評分尺" />
    </div>
    <div class="legend-row">
      <span class="legend-label">焦慮評分</span>
      <img class="legend-img" src="chart_anxiety.png" alt="焦慮評分尺" />
    </div>
    <div class="legend-row">
      <span class="legend-label">睡眠質素</span>
      <img class="legend-img" src="chart_sleep.png" alt="睡眠質素評分尺" />
    </div>
  </div>

  <!-- Daily tracking grid -->
  <div class="grid-section">
    <table>
      <thead>
        <tr>
          <th class="col-date">日期</th>
          <th class="col-mood">情緒<br><span style="font-weight:400;font-size:9px;">（圈出1–5）</span></th>
          <th class="col-anxiety">焦慮<br><span style="font-weight:400;font-size:9px;">（圈出1–5）</span></th>
          <th class="col-sleep">睡眠質素<br><span style="font-weight:400;font-size:9px;">（圈出1–5）</span></th>
          <th class="col-sleeph">睡眠<br><span style="font-weight:400;font-size:9px;">時數</span></th>
          <th class="col-notes">備注（事件 / 感受 / 用藥）</th>
        </tr>
      </thead>
      <tbody id="chart-body">
        <!-- Rows injected by JS -->
      </tbody>
    </table>
  </div>

  <!-- Footer -->
  <img class="footer-img" src="chart_footer.png" alt="鼓勵語句" />

  <!-- Print button (screen only) -->
  <button class="print-btn no-print" onclick="window.print()">🖨️ 列印</button>

<script>
  const tbody  = document.getElementById('chart-body');
  const moodDots = [
    'dot dot-mood-1','dot dot-mood-2','dot dot-mood-3','dot dot-mood-4','dot dot-mood-5'
  ];
  const anxDots = [
    'dot dot-anx-1','dot dot-anx-2','dot dot-anx-3','dot dot-anx-4','dot dot-anx-5'
  ];
  const slpDots = [
    'dot dot-slp-1','dot dot-slp-2','dot dot-slp-3','dot dot-slp-4','dot dot-slp-5'
  ];

  function makeDots(classes) {
    return '<div class="rating-cell">' +
      classes.map(c => `<span class="${c}"></span>`).join('') +
      '</div>';
  }

  for (let d = 1; d <= 31; d++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${d}</td>
      <td>${makeDots(moodDots)}</td>
      <td>${makeDots(anxDots)}</td>
      <td>${makeDots(slpDots)}</td>
      <td></td>
      <td></td>
    `;
    tbody.appendChild(tr);
  }
</script>

</body>
</html>
