<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情緒記錄表</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 10mm 12mm;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #fff;
      width: 210mm;
      margin: 0 auto;
      padding: 0;
    }

    .page {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* All images full width by default */
    .full-img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    /* Legend images — no label, full width */
    .legend-img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    /* Notes frame — 4:3, centred, not full width */
    .notes-img {
      width: 80%;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
    }

    /* Print */
    @media print {
      body { margin: 0; padding: 0; }
      .no-print { display: none; }
    }

    /* Screen print button */
    .print-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c9bbea;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(100,80,140,0.25);
      z-index: 99;
    }
    .print-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="page">

    <!-- Header -->
    <img class="full-img" src="chart_header.png" alt="情緒記錄表頁首" />

    <!-- Mood scale -->
    <img class="legend-img" src="chart_mood.png" alt="情緒評分尺" />

    <!-- Anxiety scale -->
    <img class="legend-img" src="chart_anxiety.png" alt="焦慮評分尺" />

    <!-- Sleep scale -->
    <img class="legend-img" src="chart_sleep.png" alt="睡眠質素評分尺" />

    <!-- Notes text frame -->
    <img class="notes-img" src="chart_notes.png" alt="備注欄" />

    <!-- Footer -->
    <img class="full-img" src="chart_footer.png" alt="鼓勵語句" />

  </div>

  <button class="print-btn no-print" onclick="window.print()">🖨️ 列印</button>

</body>
</html>
